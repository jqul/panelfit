<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PanelFit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f2ec;--bg2:#ede9e1;--card:#fff;--card2:#f0ede6;
  --border:#d8d3c8;--border2:#c4bfb3;--text:#1a1814;--text2:#5a5650;--muted:#9a9590;
  --ink:#1a1814;--accent:#7a6248;--accent2:#b89a7a;
  --ok:#4a7c59;--warn:#c0392b;--ok-bg:#f0f7f2;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',Helvetica,Arial,sans-serif;
}
html.dark{
  --bg:#0e0e0e;--bg2:#161616;--card:#1c1c1c;--card2:#222;
  --border:#2a2a2a;--border2:#333;--text:#e8e4de;--text2:#888;--muted:#555;
  --ink:#e8e4de;--accent:#b89a7a;--ok:#5a9e6f;--ok-bg:#0f1f14;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .3s;}
#loading.hide{opacity:0;pointer-events:none;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* VISTAS */
.view{display:none;}
.view.active{display:block;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);padding:40px;width:100%;max-width:380px;}
.login-logo{font-family:var(--serif);font-size:28px;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px;letter-spacing:.3px;}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block;}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);font-size:14px;padding:10px 12px;outline:none;font-family:var(--sans);margin-bottom:12px;}
.inp:focus{border-color:var(--ink);}
.btn{width:100%;padding:11px;border:1px solid var(--ink);background:transparent;color:var(--ink);cursor:pointer;font-size:13px;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;margin-bottom:8px;}
.btn:hover{background:var(--ink);color:var(--card);}
.btn.sec{border-color:var(--border2);color:var(--muted);}
.btn.sec:hover{border-color:var(--ink);color:var(--ink);background:transparent;}
.btn.ok{border-color:var(--ok);color:var(--ok);}
.btn.ok:hover{background:var(--ok-bg);}
.btn.danger{border-color:var(--warn);color:var(--warn);}
.errmsg{font-size:11px;color:var(--warn);min-height:16px;margin-bottom:8px;}
.switch-link{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;}
.switch-link a{color:var(--accent);cursor:pointer;text-decoration:underline;}

/* DASHBOARD ENTRENADOR */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.topbar-logo{font-family:var(--serif);font-size:18px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.tbtn{padding:6px 14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;}
.tbtn:hover{border-color:var(--ink);color:var(--ink);}
.content{padding:24px;max-width:900px;margin:0 auto;}
.page-title{font-family:var(--serif);font-size:26px;font-weight:400;margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:24px;letter-spacing:.3px;}

/* CLIENTES GRID */
.clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:20px;}
.cliente-card{background:var(--card);border:1px solid var(--border);padding:18px 20px;cursor:pointer;transition:border-color .15s;position:relative;}
.cliente-card:hover{border-color:var(--ink);}
.cc-name{font-family:var(--serif);font-size:18px;font-weight:400;margin-bottom:4px;}
.cc-sub{font-size:11px;color:var(--muted);letter-spacing:.3px;}
.cc-actions{display:flex;gap:6px;margin-top:14px;}
.cc-btn{font-size:10px;padding:5px 10px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;}
.cc-btn:hover{border-color:var(--ink);color:var(--ink);}
.cc-btn.link{border-color:var(--ok);color:var(--ok);}
.cc-btn.link:hover{background:var(--ok-bg);}
.add-card{background:transparent;border:1px dashed var(--border2);padding:18px 20px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--muted);transition:all .15s;}
.add-card:hover{border-color:var(--ink);color:var(--ink);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,24,20,.8);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);padding:28px;width:100%;max-width:440px;}
.modal-title{font-family:var(--serif);font-size:18px;margin-bottom:16px;}
.modal-footer{display:flex;gap:8px;margin-top:16px;}
.modal-footer .btn{margin-bottom:0;}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--card);padding:11px 18px;font-size:12px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;font-family:var(--sans);}
.toast.show{opacity:1;}

/* PANEL CLIENTE — embebido via iframe o carga directa */
#vista-cliente{display:none;}
#vista-cliente.active{display:block;}
</style>
</head>
<body>

<div id="loading"><div style="text-align:center">
  <div class="spinner" style="margin:0 auto 16px"></div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Cargando...</div>
  <button onclick="resetApp()" style="font-size:10px;padding:5px 12px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:sans-serif">Reiniciar</button>
</div></div>

<!-- LOGIN / REGISTRO -->
<div class="view" id="view-login">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">PanelFit</div>
      <div class="login-sub">Panel de entrenamiento personalizado</div>

      <div id="login-form">
        <label class="lbl">Email</label>
        <input class="inp" type="email" id="l-email" placeholder="tu@email.com">
        <label class="lbl">Contraseña</label>
        <input class="inp" type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="errmsg" id="l-err"></div>
        <button class="btn" onclick="doLogin()">Entrar</button>
        <div class="switch-link">¿Sin cuenta? <a onclick="showReg()">Regístrate</a></div>
      </div>

      <div id="reg-form" style="display:none">
        <label class="lbl">Nombre</label>
        <input class="inp" id="r-nombre" placeholder="Tu nombre">
        <label class="lbl">Email</label>
        <input class="inp" type="email" id="r-email" placeholder="tu@email.com">
        <label class="lbl">Contraseña</label>
        <input class="inp" type="password" id="r-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doReg()">
        <div class="errmsg" id="r-err"></div>
        <button class="btn" onclick="doReg()">Crear cuenta</button>
        <div class="switch-link">¿Ya tienes cuenta? <a onclick="showLogin()">Entra aquí</a></div>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD ENTRENADOR -->
<div class="view" id="view-dash">
  <div class="topbar">
    <div class="topbar-logo">PanelFit</div>
    <div class="topbar-right">
      <span id="topbar-nombre" style="font-size:12px;color:var(--muted)"></span>
      <button class="tbtn" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="content">
    <div class="page-title">Mis clientes</div>
    <div class="page-sub" id="dash-sub">Gestiona los planes de tus clientes</div>
    <div class="clientes-grid" id="clientes-grid">
      <div class="add-card" onclick="openNewCliente()">+ Nuevo cliente</div>
    </div>
  </div>
</div>

<!-- PANEL CLIENTE (carga cuando entras con token) -->
<div class="view" id="view-cliente">
  <div id="cliente-app"></div>
</div>

<!-- MODAL NUEVO CLIENTE -->
<div class="modal-bg" id="modal-nuevo">
  <div class="modal">
    <div class="modal-title">Nuevo cliente</div>
    <label class="lbl">Nombre</label>
    <input class="inp" id="nc-nombre" placeholder="Nombre del cliente">
    <label class="lbl">Apellido</label>
    <input class="inp" id="nc-apellido" placeholder="Apellido">
    <div class="errmsg" id="nc-err"></div>
    <div class="modal-footer">
      <button class="btn ok" onclick="crearCliente()">Crear</button>
      <button class="btn sec" onclick="closeModal('modal-nuevo')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL ENLACE CLIENTE -->
<div class="modal-bg" id="modal-link">
  <div class="modal">
    <div class="modal-title" id="ml-title">Enlace del cliente</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Manda este enlace al cliente por WhatsApp. Solo él puede acceder.</p>
    <div style="background:var(--bg2);border:1px solid var(--border);padding:10px 12px;font-size:12px;word-break:break-all;margin-bottom:12px;color:var(--text2)" id="ml-url"></div>
    <div class="modal-footer">
      <button class="btn ok" onclick="copyLink()">Copiar enlace</button>
      <button class="btn sec" onclick="closeModal('modal-link')">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──────────────────────────
const SB_URL = 'https://thurxdxazqqxuzbupghv.supabase.co';
const SB_KEY = 'sb_publishable_1ibz-ToK63tKmo5H5-ogJA_n2nfMIF7';
const sb = supabase.createClient(SB_URL, SB_KEY);

// ── UTILS ─────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg,ms=2500){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function loading(show){ document.getElementById('loading').classList.toggle('hide',!show); }

// ── AUTH ──────────────────────────────
function showLogin(){ document.getElementById('login-form').style.display=''; document.getElementById('reg-form').style.display='none'; }
function showReg(){ document.getElementById('login-form').style.display='none'; document.getElementById('reg-form').style.display=''; }

async function doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var pass=document.getElementById('l-pass').value;
  document.getElementById('l-err').textContent='';
  if(!email||!pass){document.getElementById('l-err').textContent='Rellena email y contraseña.';return;}
  loading(true);
  var {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){loading(false);document.getElementById('l-err').textContent=error.message;return;}
  _user=data.user;
  await loadDash();
}
async function doReg(){
  var nombre=document.getElementById('r-nombre').value.trim();
  var email=document.getElementById('r-email').value.trim();
  var pass=document.getElementById('r-pass').value;
  document.getElementById('r-err').textContent='';
  if(!nombre||!email||!pass){document.getElementById('r-err').textContent='Rellena todos los campos.';return;}
  loading(true);
  var {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){loading(false);document.getElementById('r-err').textContent=error.message;return;}
  // Crear perfil entrenador (upsert por si ya existe)
  await sb.from('entrenadores').upsert({id:data.user.id,nombre,email},{onConflict:'id'});
  loading(false);
  toast('Cuenta creada. Revisa tu email para confirmar.');
  showLogin();
}
async function doLogout(){
  try{ await sb.auth.signOut(); }catch(e){}
  resetApp();
}

// ── SESIÓN ────────────────────────────
var _user=null;

function resetApp(){
  try{
    // Limpiar todo Supabase del localStorage
    Object.keys(localStorage).forEach(k=>{ if(k.startsWith('sb-')) localStorage.removeItem(k); });
  }catch(e){}
  window.location.href = window.location.pathname;
}

// Arranque
(async function init(){
  // Safety net — nunca quedarse bloqueado
  var safetyTimer = setTimeout(()=>{
    loading(false);
    showView('view-login');
  }, 6000);

  try{
    var token = getClientToken();
    var {data:{session}, error} = await sb.auth.getSession();
    clearTimeout(safetyTimer);

    if(error){ loading(false); showView('view-login'); return; }

    if(session && session.user){
      _user = session.user;
      if(token){ await loadClienteApp(token); }
      else { await loadDash(); }
    } else {
      if(token){ await loadClienteApp(token); }
      else { loading(false); showView('view-login'); }
    }
  } catch(e){
    clearTimeout(safetyTimer);
    console.error('Init error:',e);
    loading(false);
    showView('view-login');
  }
})();

// Escuchar cambios de sesión (login/logout)
sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_IN' && session){
    _user=session.user;
    var token=getClientToken();
    if(!token) await loadDash();
  }
  if(event==='SIGNED_OUT'){
    showView('view-login');
  }
});

function getClientToken(){
  var p=new URLSearchParams(window.location.search);
  var t=p.get('c');
  return (t && t!=='__coach__') ? t : null;
}

// ── DASHBOARD ─────────────────────────
async function loadDash(){
  loading(true);
  try{
    // Asegurar que existe el perfil — crearlo si no
    var {data:perfil}=await sb.from('entrenadores').select('nombre').eq('id',_user.id).single();
    if(!perfil){
      await sb.from('entrenadores').insert({id:_user.id, nombre:_user.email, email:_user.email});
      perfil={nombre:_user.email};
    }
    document.getElementById('topbar-nombre').textContent=perfil.nombre||_user.email;
    await renderClientes();
  } catch(e){ console.error('loadDash error:',e); }
  loading(false);
  showView('view-dash');
}

async function renderClientes(){
  var {data:clientes,error}=await sb.from('clientes').select('*').eq('entrenador_id',_user.id).order('created_at');
  var grid=document.getElementById('clientes-grid');
  var cards=( clientes||[]).map(c=>`
    <div class="cliente-card">
      <div class="cc-name">${c.nombre} ${c.apellido||''}</div>
      <div class="cc-sub">Creado ${new Date(c.created_at).toLocaleDateString('es-ES')}</div>
      <div class="cc-actions">
        <button class="cc-btn" onclick="editarCliente('${c.id}')">✏️ Plan</button>
        <button class="cc-btn link" onclick="verLink('${c.id}','${c.nombre} ${c.apellido||''}','${c.token}')">🔗 Enlace</button>
        <button class="cc-btn" onclick="borrarCliente('${c.id}','${c.nombre}')">🗑</button>
      </div>
    </div>`).join('');
  grid.innerHTML=cards+`<div class="add-card" onclick="openNewCliente()">+ Nuevo cliente</div>`;
}

function openNewCliente(){
  document.getElementById('nc-nombre').value='';
  document.getElementById('nc-apellido').value='';
  document.getElementById('nc-err').textContent='';
  openModal('modal-nuevo');
  setTimeout(()=>document.getElementById('nc-nombre').focus(),100);
}

async function crearCliente(){
  var nombre=document.getElementById('nc-nombre').value.trim();
  var apellido=document.getElementById('nc-apellido').value.trim();
  if(!nombre){document.getElementById('nc-err').textContent='El nombre es obligatorio.';return;}
  loading(true);
  var {data:c,error}=await sb.from('clientes').insert({entrenador_id:_user.id,nombre,apellido}).select().single();
  if(error){loading(false);document.getElementById('nc-err').textContent=error.message;return;}
  // Crear plan vacío y registros vacíos
  await sb.from('planes').insert({cliente_id:c.id,datos:{}});
  await sb.from('registros').insert({cliente_id:c.id,datos:{}});
  closeModal('modal-nuevo');
  await renderClientes();
  loading(false);
  toast('Cliente '+nombre+' creado ✓');
  // Abrir editor de plan directamente
  editarCliente(c.id);
}

async function borrarCliente(id,nombre){
  if(!confirm('¿Borrar a '+nombre+'? Se eliminan todos sus datos.'))return;
  loading(true);
  await sb.from('clientes').delete().eq('id',id);
  await renderClientes();
  loading(false);
  toast('Cliente eliminado');
}

function verLink(id,nombre,token){
  var url=window.location.origin+window.location.pathname+'?c='+token;
  document.getElementById('ml-title').textContent='Enlace de '+nombre;
  document.getElementById('ml-url').textContent=url;
  openModal('modal-link');
}
function copyLink(){
  var url=document.getElementById('ml-url').textContent;
  navigator.clipboard.writeText(url).then(()=>toast('Enlace copiado ✓'));
}

// ── EDITOR DE PLAN (abre el panel con modo entrenador) ────────────────────────
async function editarCliente(clienteId){
  loading(true);
  try{
    var {data:c}=await sb.from('clientes').select('*').eq('id',clienteId).single();
    var {data:pl}=await sb.from('planes').select('datos').eq('cliente_id',clienteId).single();
    var {data:rg}=await sb.from('registros').select('datos').eq('cliente_id',clienteId).single();
    montarPanel(c, pl?.datos||{}, rg?.datos||{}, null, true, clienteId);
  }catch(e){ console.error(e); }
  loading(false);
}

// ── PANEL CLIENTE ─────────────────────
async function loadClienteApp(token){
  loading(true);
  try{
    // Solo modo cliente con token (el modo coach usa editarCliente directamente)
    var {data:c}=await sb.from('clientes').select('*').eq('token',token).single();
    if(!c){
      document.getElementById('cliente-app').innerHTML='<div style="padding:40px;text-align:center;font-size:14px;color:var(--muted)">Enlace no válido.</div>';
      loading(false); showView('view-cliente'); return;
    }
    var {data:pl}=await sb.from('planes').select('datos').eq('cliente_id',c.id).single();
    var {data:rg}=await sb.from('registros').select('datos').eq('cliente_id',c.id).single();
    montarPanel(c, pl?.datos||{}, rg?.datos||{}, token, false, c.id);
  }catch(e){ console.error('loadClienteApp:',e); }
  loading(false);
}

async function guardarPlan(clienteId, planObj){
  await sb.from('planes').upsert({cliente_id:clienteId, datos:planObj, updated_at:new Date()},{onConflict:'cliente_id'});
}
async function guardarRegistros(clienteId, regObj){
  await sb.from('registros').upsert({cliente_id:clienteId, datos:regObj, updated_at:new Date()},{onConflict:'cliente_id'});
}

function montarPanel(cliente, plan, registros, token, isCoach, clienteId){
  // El panel completo se incrusta aquí — usamos un iframe con srcdoc
  // para aislar el localStorage y los datos por cliente
  var container=document.getElementById('cliente-app');

  // Pasar datos al panel via postMessage
  var planStr=JSON.stringify(plan);
  var regStr=JSON.stringify(registros);
  var nombreCliente=(cliente?.nombre||'')+(cliente?.apellido?' '+cliente.apellido:'');
  var cid=clienteId||cliente?.id||'';

  container.innerHTML=`
    <div style="background:var(--bg);min-height:100vh">
      <div style="background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <span style="font-family:var(--serif);font-size:16px">PanelFit ${isCoach?'· <span style=color:var(--accent)>Modo Entrenador</span>':''}</span>
        <div style="display:flex;gap:8px">
          ${isCoach?'<button class="tbtn" style="border-color:var(--ok);color:var(--ok)" onclick="volverDash()">← Mis clientes</button>':''}
          <span id="sync-status" style="font-size:11px;color:var(--muted);align-self:center"></span>
          <button class="tbtn" onclick="syncNow('${cid}')">☁️ Guardar</button>
        </div>
      </div>
      <div id="panel-root"></div>
    </div>`;

  // Autoguardado cada 45 segundos
  window._syncClienteId=cid;
  window._syncInterval=setInterval(()=>syncNow(cid),45000);

  // Aquí inyectamos el panel real (el HTML que ya tenemos)
  // Por simplicidad en esta versión, mostramos un placeholder
  // El panel completo se integra en el siguiente paso
  document.getElementById('panel-root').innerHTML=`
    <div style="padding:40px;text-align:center">
      <div style="font-family:var(--serif);font-size:22px;margin-bottom:8px">Hola, ${nombreCliente}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:24px">Tu panel está listo. Datos cargados desde la nube.</div>
      <div style="display:inline-block;background:var(--ok-bg);border:1px solid var(--ok);color:var(--ok);padding:10px 20px;font-size:12px">✓ Conectado · ${new Date().toLocaleTimeString('es-ES')}</div>
    </div>`;
}

function volverDash(){
  clearInterval(window._syncInterval);
  showView('view-dash');
  renderClientes();
}

async function syncNow(clienteId){
  if(!clienteId)return;
  document.getElementById('sync-status').textContent='Guardando...';
  // En la versión completa aquí se recogen los datos del panel y se guardan
  await guardarRegistros(clienteId, window._panelRegistros||{});
  document.getElementById('sync-status').textContent='Guardado '+new Date().toLocaleTimeString('es-ES');
}

</script>
