<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PanelFit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── TOKENS ─────────────────────────── */
:root{
  --bg:#f5f2ec;--bg2:#edeae3;--card:#faf8f5;--card2:#f0ede6;
  --border:#ddd9d0;--border2:#c8c3b8;
  --text:#1a1814;--text2:#5a5650;--muted:#9a9590;
  --ink:#1a1814;--accent:#7a6248;--accent2:#b89a7a;
  --ok:#4a7c59;--warn:#c0392b;--ok-bg:#f0f7f2;
  --green:#2d6a4f;--purple:#7c5cbf;--purple-bg:rgba(124,92,191,.08);
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,Arial,sans-serif;
  --r:6px; --shadow:0 2px 12px rgba(0,0,0,.07);
}
html.dark{
  --bg:#111110;--bg2:#181816;--card:#1e1d1b;--card2:#242320;
  --border:#2c2b28;--border2:#363430;
  --text:#e8e4de;--text2:#7a7570;--muted:#4a4a46;
  --ink:#e8e4de;--accent:#b89a7a;--ok:#5a9e6f;--ok-bg:#0d1f12;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;transition:opacity .4s;}
#loading.hide{opacity:0;pointer-events:none;}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* VISTAS */
.view{display:none;}
.view.active{display:block;}

/* ── LOGIN ─────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);}
.login-box{width:100%;max-width:360px;}
.login-logo{font-family:var(--serif);font-size:36px;font-weight:400;letter-spacing:-.5px;margin-bottom:4px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:36px;letter-spacing:.4px;}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.9px;margin-bottom:5px;display:block;}
.inp{width:100%;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:14px;padding:11px 14px;outline:none;font-family:var(--sans);margin-bottom:10px;border-radius:var(--r);transition:border-color .15s;}
.inp:focus{border-color:var(--accent);}
.btn{width:100%;padding:12px;border:none;background:var(--ink);color:var(--card);cursor:pointer;font-size:13px;font-family:var(--sans);letter-spacing:.4px;transition:opacity .15s;margin-bottom:8px;border-radius:var(--r);font-weight:500;}
.btn:hover{opacity:.85;}
.btn.sec{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn.sec:hover{border-color:var(--ink);color:var(--ink);opacity:1;}
.btn.ok{background:var(--ok);}
.btn.danger{background:var(--warn);}
.errmsg{font-size:11px;color:var(--warn);min-height:16px;margin-bottom:8px;}
.switch-link{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;}
.switch-link a{color:var(--accent);cursor:pointer;text-decoration:none;border-bottom:1px solid var(--accent2);}

/* ── TOPBAR ENTRENADOR ─────────────── */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:stretch;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:50;height:52px;}
.topbar-logo{font-family:var(--serif);font-size:20px;display:flex;align-items:center;gap:2px;letter-spacing:-.3px;}
.topbar-logo span{color:var(--accent);font-style:italic;}
.topbar-right{display:flex;gap:4px;align-items:center;}
.tbtn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;border-radius:var(--r);}
.tbtn:hover{border-color:var(--ink);color:var(--ink);}

/* ── DASHBOARD ─────────────────────── */
.content{padding:28px 24px;max-width:960px;margin:0 auto;}
.page-title{font-family:var(--serif);font-size:30px;font-weight:400;margin-bottom:4px;letter-spacing:-.3px;}
.page-sub{font-size:12px;color:var(--muted);margin-bottom:28px;letter-spacing:.3px;}

/* CLIENTES GRID */
.clientes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:24px;}
.cliente-card{background:var(--card);border:1px solid var(--border);padding:20px 22px;cursor:pointer;transition:all .18s;border-radius:var(--r);box-shadow:var(--shadow);}
.cliente-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.cc-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;color:var(--accent);margin-bottom:12px;flex-shrink:0;}
.cc-name{font-family:var(--serif);font-size:19px;font-weight:400;margin-bottom:3px;letter-spacing:-.2px;}
.cc-sub{font-size:11px;color:var(--muted);letter-spacing:.3px;}
.cc-actions{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;}
.cc-btn{font-size:10px;padding:5px 11px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;border-radius:4px;}
.cc-btn:hover{border-color:var(--ink);color:var(--ink);}
.cc-btn.link{border-color:var(--ok);color:var(--ok);}
.cc-btn.link:hover{background:var(--ok-bg);}
.add-card{background:transparent;border:2px dashed var(--border2);padding:20px 22px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--muted);transition:all .15s;border-radius:var(--r);min-height:120px;}
.add-card:hover{border-color:var(--accent);color:var(--accent);}

/* ── MODAL ─────────────────────────── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,18,15,.75);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);padding:28px;width:100%;max-width:440px;border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:18px;letter-spacing:-.2px;}
.modal-footer{display:flex;gap:8px;margin-top:18px;}
.modal-footer .btn{margin-bottom:0;}

/* ── TOAST ─────────────────────────── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--bg);padding:12px 20px;font-size:12px;z-index:999;opacity:0;transition:all .25s;pointer-events:none;font-family:var(--sans);border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.2);letter-spacing:.3px;}
.toast.show{opacity:1;}

#vista-cliente.active{display:block;}
</style>
</head>
<body>

<div id="loading"><div style="text-align:center">
  <div class="spinner" style="margin:0 auto 16px"></div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Cargando...</div>
  <button onclick="resetApp()" style="font-size:10px;padding:5px 12px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:sans-serif">Reiniciar</button>
</div></div>

<!-- LOGIN / REGISTRO -->
<div class="view" id="view-login">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">Panel<span>Fit</span></div>
      <div class="login-sub">Plataforma de entrenamiento personalizado</div>

      <div id="login-form">
        <label class="lbl">Email</label>
        <input class="inp" type="email" id="l-email" placeholder="tu@email.com">
        <label class="lbl">Contraseña</label>
        <input class="inp" type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="errmsg" id="l-err"></div>
        <button class="btn" onclick="doLogin()">Entrar</button>
        <div class="switch-link">¿Sin cuenta? <a onclick="showReg()">Regístrate</a></div>
      </div>

      <div id="reg-form" style="display:none">
        <label class="lbl">Nombre</label>
        <input class="inp" id="r-nombre" placeholder="Tu nombre">
        <label class="lbl">Email</label>
        <input class="inp" type="email" id="r-email" placeholder="tu@email.com">
        <label class="lbl">Contraseña</label>
        <input class="inp" type="password" id="r-pass" placeholder="Mínimo 6 caracteres" onkeydown="if(event.key==='Enter')doReg()">
        <div class="errmsg" id="r-err"></div>
        <button class="btn" onclick="doReg()">Crear cuenta</button>
        <div class="switch-link">¿Ya tienes cuenta? <a onclick="showLogin()">Entra aquí</a></div>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD ENTRENADOR -->
<div class="view" id="view-dash">
  <div class="topbar">
    <div class="topbar-logo">Panel<span>Fit</span></div>
    <div class="topbar-right">
      <span id="topbar-nombre" style="font-size:12px;color:var(--muted);padding-right:4px"></span>
      <button class="tbtn" onclick="doLogout()">Salir →</button>
    </div>
  </div>
  <div class="content">
    <div class="page-title">Mis clientes</div>
    <div class="page-sub" id="dash-sub">Gestiona los planes de tus clientes</div>
    <div class="clientes-grid" id="clientes-grid">
      <div class="add-card" onclick="openNewCliente()">+ Nuevo cliente</div>
    </div>
  </div>
</div>

<!-- PANEL CLIENTE (carga cuando entras con token) -->
<div class="view" id="view-cliente">
  <div id="cliente-app"></div>
</div>

<!-- MODAL NUEVO CLIENTE -->
<div class="modal-bg" id="modal-nuevo">
  <div class="modal">
    <div class="modal-title">Nuevo cliente</div>
    <label class="lbl">Nombre</label>
    <input class="inp" id="nc-nombre" placeholder="Nombre del cliente">
    <label class="lbl">Apellido</label>
    <input class="inp" id="nc-apellido" placeholder="Apellido">
    <div class="errmsg" id="nc-err"></div>
    <div class="modal-footer">
      <button class="btn ok" onclick="crearCliente()">Crear</button>
      <button class="btn sec" onclick="closeModal('modal-nuevo')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL ENLACE CLIENTE -->
<div class="modal-bg" id="modal-link">
  <div class="modal">
    <div class="modal-title" id="ml-title">Enlace del cliente</div>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Manda este enlace al cliente por WhatsApp. Solo él puede acceder.</p>
    <div style="background:var(--bg2);border:1px solid var(--border);padding:10px 12px;font-size:12px;word-break:break-all;margin-bottom:12px;color:var(--text2)" id="ml-url"></div>
    <div class="modal-footer">
      <button class="btn ok" onclick="copyLink()">Copiar enlace</button>
      <button class="btn sec" onclick="closeModal('modal-link')">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── SUPABASE ──────────────────────────
const SB_URL = 'https://thurxdxazqqxuzbupghv.supabase.co';
const SB_KEY = 'sb_publishable_1ibz-ToK63tKmo5H5-ogJA_n2nfMIF7';
const sb = supabase.createClient(SB_URL, SB_KEY);

// ── UTILS ─────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function toast(msg,ms=2500){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function loading(show){ document.getElementById('loading').classList.toggle('hide',!show); }

// ── AUTH ──────────────────────────────
function showLogin(){ document.getElementById('login-form').style.display=''; document.getElementById('reg-form').style.display='none'; }
function showReg(){ document.getElementById('login-form').style.display='none'; document.getElementById('reg-form').style.display=''; }

async function doLogin(){
  var email=document.getElementById('l-email').value.trim();
  var pass=document.getElementById('l-pass').value;
  document.getElementById('l-err').textContent='';
  if(!email||!pass){document.getElementById('l-err').textContent='Rellena email y contraseña.';return;}
  loading(true);
  var {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){loading(false);document.getElementById('l-err').textContent='Email o contraseña incorrectos.';return;}
  // Comprobar si el entrenador está activo
  var {data:perfil}=await sb.from('entrenadores').select('activo,nombre').eq('id',data.user.id).single();
  if(!perfil||perfil.activo===false){
    await sb.auth.signOut();
    loading(false);
    document.getElementById('l-err').textContent='Tu cuenta está pendiente de activación. Contacta con el administrador.';
    return;
  }
  _user=data.user;
  await loadDash();
}
async function doReg(){
  var nombre=document.getElementById('r-nombre').value.trim();
  var email=document.getElementById('r-email').value.trim();
  var pass=document.getElementById('r-pass').value;
  document.getElementById('r-err').textContent='';
  if(!nombre||!email||!pass){document.getElementById('r-err').textContent='Rellena todos los campos.';return;}
  loading(true);
  var {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){loading(false);document.getElementById('r-err').textContent=error.message;return;}
  // Crear perfil entrenador (upsert por si ya existe)
  await sb.from('entrenadores').upsert({id:data.user.id,nombre,email,activo:false},{onConflict:'id'});
  loading(false);
  toast('Cuenta creada. En breve recibirás confirmación de acceso.',4000);
  showLogin();
}
async function doLogout(){
  try{ await sb.auth.signOut(); }catch(e){}
  resetApp();
}

// ── SESIÓN ────────────────────────────
var _user=null;

function resetApp(){
  try{
    // Limpiar todo Supabase del localStorage
    Object.keys(localStorage).forEach(k=>{ if(k.startsWith('sb-')) localStorage.removeItem(k); });
  }catch(e){}
  window.location.href = window.location.pathname;
}

// Arranque
(async function init(){
  var safetyTimer = setTimeout(()=>{ loading(false); showView('view-login'); }, 8000);
  try{
    var token = getClientToken();
    // Si es cliente con token, no necesita sesión de entrenador
    if(token){
      clearTimeout(safetyTimer);
      await loadClienteApp(token);
      return;
    }
    var {data:{session}, error} = await sb.auth.getSession();
    clearTimeout(safetyTimer);
    if(error || !session || !session.user){ loading(false); showView('view-login'); return; }
    _user = session.user;
    await loadDash();
  } catch(e){
    clearTimeout(safetyTimer);
    console.error('Init error:',e);
    loading(false);
    showView('view-login');
  }
})();

// Solo escuchar SIGNED_OUT para cerrar sesión
sb.auth.onAuthStateChange(function(event, session){
  if(event==='SIGNED_OUT'){ showView('view-login'); }
  if(event==='TOKEN_REFRESHED' && session){ _user=session.user; }
});

function getClientToken(){
  var p=new URLSearchParams(window.location.search);
  var t=p.get('c');
  return (t && t!=='__coach__') ? t : null;
}

// ── DASHBOARD ─────────────────────────

async function loadDash(){
  loading(true);
  try{
    // Asegurar que existe el perfil — crearlo si no
    var {data:perfil}=await sb.from('entrenadores').select('nombre').eq('id',_user.id).single();
    if(!perfil){
      await sb.from('entrenadores').insert({id:_user.id, nombre:_user.email, email:_user.email});
      perfil={nombre:_user.email};
    }
    document.getElementById('topbar-nombre').textContent=perfil.nombre||_user.email;

    await renderClientes();
  } catch(e){ console.error('loadDash error:',e); }
  loading(false);
  showView('view-dash');
}

async function renderClientes(){
  var {data:clientes,error}=await sb.from('clientes').select('*').eq('entrenador_id',_user.id).order('created_at');
  var grid=document.getElementById('clientes-grid');
  var cards=( clientes||[]).map(c=>`
    <div class="cliente-card">
      <div class="cc-name">${c.nombre} ${c.apellido||''}</div>
      <div class="cc-sub">Creado ${new Date(c.created_at).toLocaleDateString('es-ES')}</div>
      <div class="cc-actions">
        <button class="cc-btn" onclick="editarCliente('${c.id}')">✏️ Plan</button>
        <button class="cc-btn link" onclick="verLink('${c.id}','${c.nombre} ${c.apellido||''}','${c.token}')">🔗 Enlace</button>
        <button class="cc-btn" onclick="borrarCliente('${c.id}','${c.nombre}')">🗑</button>
      </div>
    </div>`).join('');
  grid.innerHTML=cards+`<div class="add-card" onclick="openNewCliente()">+ Nuevo cliente</div>`;
}

function openNewCliente(){
  document.getElementById('nc-nombre').value='';
  document.getElementById('nc-apellido').value='';
  document.getElementById('nc-err').textContent='';
  openModal('modal-nuevo');
  setTimeout(()=>document.getElementById('nc-nombre').focus(),100);
}

async function crearCliente(){
  var nombre=document.getElementById('nc-nombre').value.trim();
  var apellido=document.getElementById('nc-apellido').value.trim();
  if(!nombre){document.getElementById('nc-err').textContent='El nombre es obligatorio.';return;}
  loading(true);
  var {data:c,error}=await sb.from('clientes').insert({entrenador_id:_user.id,nombre,apellido}).select().single();
  if(error){loading(false);document.getElementById('nc-err').textContent=error.message;return;}
  // Crear plan vacío y registros vacíos
  await sb.from('planes').insert({cliente_id:c.id,datos:{}});
  await sb.from('registros').insert({cliente_id:c.id,datos:{}});
  closeModal('modal-nuevo');
  await renderClientes();
  loading(false);
  toast('Cliente '+nombre+' creado ✓');
  // Abrir editor de plan directamente
  editarCliente(c.id);
}

async function borrarCliente(id,nombre){
  if(!confirm('¿Borrar a '+nombre+'? Se eliminan todos sus datos.'))return;
  loading(true);
  await sb.from('clientes').delete().eq('id',id);
  await renderClientes();
  loading(false);
  toast('Cliente eliminado');
}

function verLink(id,nombre,token){
  var url=window.location.origin+window.location.pathname+'?c='+token;
  document.getElementById('ml-title').textContent='Enlace de '+nombre;
  document.getElementById('ml-url').textContent=url;
  openModal('modal-link');
}
function copyLink(){
  var url=document.getElementById('ml-url').textContent;
  navigator.clipboard.writeText(url).then(()=>toast('Enlace copiado ✓'));
}

// ── EDITOR DE PLAN (abre el panel con modo entrenador) ────────────────────────
async function editarCliente(clienteId){
  loading(true);
  try{
    var {data:c}=await sb.from('clientes').select('*').eq('id',clienteId).single();
    var {data:pl}=await sb.from('planes').select('datos').eq('cliente_id',clienteId).single();
    var {data:rg}=await sb.from('registros').select('datos').eq('cliente_id',clienteId).single();
    montarPanel(c, pl?.datos||{}, rg?.datos||{}, null, true, clienteId);
  }catch(e){ console.error(e); }
  loading(false);
}

// ── PANEL CLIENTE ─────────────────────
async function loadClienteApp(token){
  loading(true);
  try{
    var {data:c}=await sb.from('clientes').select('*').eq('token',token).single();
    if(!c){
      loading(false);
      showView('view-cliente');
      document.getElementById('cliente-app').innerHTML='<div style="padding:60px;text-align:center;font-family:var(--serif);font-size:18px;color:var(--muted)">Enlace no válido.</div>';
      return;
    }
    var {data:pl}=await sb.from('planes').select('datos').eq('cliente_id',c.id).single();
    var {data:rg}=await sb.from('registros').select('datos').eq('cliente_id',c.id).single();
    montarPanel(c, pl?.datos||{}, rg?.datos||{}, token, false, c.id);
  }catch(e){ console.error('loadClienteApp:',e); }
  loading(false);
}

async function guardarPlan(clienteId, planObj){
  await sb.from('planes').upsert({cliente_id:clienteId, datos:planObj, updated_at:new Date()},{onConflict:'cliente_id'});
}
async function guardarRegistros(clienteId, regObj){
  await sb.from('registros').upsert({cliente_id:clienteId, datos:regObj, updated_at:new Date()},{onConflict:'cliente_id'});
}


// ── CSS PANEL ──────────────────────────
(function(){var s=document.createElement('style');s.textContent=`
:root{
  --bg:#f5f2ec;--bg2:#ede9e1;--card:#fff;--card2:#f0ede6;
  --border:#d8d3c8;--border2:#c4bfb3;--text:#1a1814;--text2:#5a5650;--muted:#9a9590;
  --ink:#1a1814;--accent:#7a6248;--accent2:#b89a7a;
  --ok:#4a7c59;--warn:#c0392b;--ok-bg:#f0f7f2;--warn-bg:#fdf0ef;
  --green:#2d6a4f;--purple:#7c5cbf;--purple-bg:rgba(124,92,191,.08);
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',Helvetica,Arial,sans-serif;
}
html.dark{
  --bg:#0e0e0e;--bg2:#161616;--card:#1c1c1c;--card2:#222;
  --border:#2a2a2a;--border2:#333;--text:#e8e4de;--text2:#888;--muted:#555;
  --ink:#e8e4de;--accent:#b89a7a;--accent2:#7a6248;
  --ok:#5a9e6f;--warn:#c0392b;--ok-bg:#0f1f14;--warn-bg:#1f0f0f;
  --green:#3d8f6a;--purple:#9b7de0;--purple-bg:rgba(155,125,224,.12);
}
html.font-hel{
  --serif:Helvetica,Arial,sans-serif;
  --sans:Helvetica,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s;}
.tbadge{font-size:10px;padding:4px 10px;border:1px solid var(--border2);color:var(--muted);cursor:pointer;letter-spacing:.5px;transition:all .15s;background:transparent;font-family:var(--sans);}
.tbadge:hover,.tbadge.on{border-color:var(--ink);color:var(--ink);}
.tbadge.on{background:var(--bg2);}

/* HEADER */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.hname{font-family:var(--serif);font-size:22px;font-weight:400;letter-spacing:-.3px;}
.hname span{color:var(--accent);}
.hstats{display:flex;gap:20px;flex-wrap:wrap;}
.hst{text-align:right;}
.hst-v{font-family:var(--serif);font-size:17px;font-weight:400;}
.hst-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}

/* ACTION BAR */
.abar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.mbadge{font-size:11px;padding:3px 10px;border:1px solid var(--border2);color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.abtn{font-size:11px;padding:6px 14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:var(--sans);letter-spacing:.3px;}
.abtn:hover{border-color:var(--ink);color:var(--ink);}
.abtn.g{border-color:var(--ok);color:var(--ok);}
.abtn.g:hover{background:var(--ok-bg);}
.abtn.p{border-color:var(--accent);color:var(--accent);}
.abtn.p:hover{background:#f8f4ef;}

/* TIMER */
.tbar-inline{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.tnum{font-family:var(--serif);font-size:34px;font-weight:400;color:var(--ok);min-width:78px;text-align:center;transition:color .3s;}
.tnum.warn{color:#d4822a;} .tnum.over{color:var(--warn);}
.ttrack{flex:1;min-width:80px;height:3px;background:var(--border);overflow:hidden;}
.tfill{height:100%;background:var(--ok);transition:width .9s linear,background .3s;}
.tbtn{padding:6px 14px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;}
.tbtn.run{border-color:var(--ok);color:var(--ok);}
.tbtn:hover{border-color:var(--ink);color:var(--ink);}
.rqbs{display:flex;gap:5px;flex-wrap:wrap;}
.rqb{padding:5px 10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s;}
.rqb:hover{border-color:var(--ink);color:var(--ink);}
.rqb.plan{border-color:var(--accent2);color:var(--accent);}

/* TABS */
.tabs{background:var(--card);border-bottom:1px solid var(--border);display:flex;padding:0 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:2px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:14px 14px;cursor:pointer;font-size:10px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;letter-spacing:.6px;text-transform:uppercase;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.panel{display:none;padding:24px;max-width:900px;}
.panel.active{display:block;animation:fadeUp .18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ptitle{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:4px;letter-spacing:-.2px;}
.psub{font-size:11px;color:var(--muted);margin-bottom:20px;letter-spacing:.3px;}

/* NOTE */
.note{border-top:1px solid var(--border);padding:12px 0 0;font-size:12px;line-height:1.7;color:var(--text2);margin-top:16px;}
.note strong{color:var(--text);}
.note.ok{color:var(--ok);}
.note.warn{color:var(--warn);}
.note.orange{color:#b05a1a;}
.note.purple{color:var(--accent);}

/* DASHBOARD */
.dg4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:24px;border:1px solid var(--border);background:var(--border);}
.dc{background:var(--card);padding:18px 20px;border-radius:var(--r);}
.dc-num{font-family:var(--serif);font-size:32px;font-weight:400;line-height:1;}
.dc-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px;}
.dc-sub{font-size:11px;color:var(--text2);margin-top:3px;}

/* DÍAS DESPLEGABLES */
.day-block{border:1px solid var(--border);margin-bottom:8px;overflow:hidden;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);}
.day-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .12s;}
.day-hd:hover{background:var(--bg2);}
.day-left{display:flex;align-items:center;gap:12px;}
.day-chev{font-size:11px;color:var(--muted);transition:transform .2s;}
.day-chev.open{transform:rotate(180deg);}
.day-title{font-family:var(--serif);font-size:15px;font-weight:400;}
.day-foco{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.2px;}
.day-prog{font-size:10px;padding:2px 9px;letter-spacing:.4px;text-transform:uppercase;}
.day-prog.done{border:1px solid var(--ok);color:var(--ok);}
.day-prog.partial{border:1px solid #d4822a;color:#d4822a;}
.day-prog.empty{border:1px solid var(--border2);color:var(--muted);}
.day-body{display:none;border-top:1px solid var(--border);}
.day-body.open{display:block;}
.wpills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;}
.wpill{padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;transition:all .12s;letter-spacing:.3px;}
.wpill.active{border-color:var(--ink);color:var(--ink);background:var(--bg2);}
.wpill.current{border-color:var(--accent);color:var(--accent);}

/* TABLA EJERCICIOS */
.ext{width:100%;border-collapse:collapse;}
.ext th{padding:8px 16px;text-align:left;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;background:var(--bg2);font-weight:400;}
.ext td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);}
.ext tr:last-child td{border-bottom:none;}
.mr td:first-child{border-left:2px solid var(--ink);padding-left:14px;}
.mr td{background:#fdfcfa;}
.wtag{display:inline-block;border:1px solid var(--border2);color:var(--text2);font-size:11px;padding:2px 8px;}
.wtag.m{border-color:var(--ink);color:var(--ink);background:var(--bg2);}
.rpe-tag{font-size:9px;color:var(--muted);margin-left:6px;letter-spacing:.4px;}
.pr-badge{display:inline-block;font-size:9px;border:1px solid var(--accent2);color:var(--accent);padding:1px 6px;margin-left:6px;letter-spacing:.4px;}

/* COMENTARIO ENTRENADOR */
.ccom{display:flex;align-items:flex-start;gap:10px;padding:10px 16px 11px;background:var(--bg2);border-top:1px solid var(--border);}
.ccom-lbl{font-size:9px;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.ccom-txt{font-size:12px;color:var(--text2);line-height:1.6;font-style:italic;}

/* LOG — INPUTS */
.lr td{padding:12px 16px 14px!important;background:var(--bg);}
.linps{display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.lset{background:var(--card);border:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:var(--r);}
.lset-lbl{font-size:9px;color:var(--muted);font-weight:400;letter-spacing:.8px;text-transform:uppercase;}
.lset-fields{display:flex;align-items:center;gap:5px;}
.lset input{width:54px;background:transparent;border:none;color:var(--text);font-size:19px;font-weight:300;outline:none;text-align:center;font-family:var(--serif);}
.lset input::placeholder{color:var(--border2);}
.lset-x{font-size:13px;color:var(--border2);}
.dbtn{padding:9px 16px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;}
.dbtn:hover{border-color:var(--ok);color:var(--ok);}
.dbtn.done{border-color:var(--ok);color:var(--ok);background:var(--ok-bg);}
.rbtn{padding:9px 16px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;}
.rbtn:hover{border-color:var(--ink);color:var(--ink);}
.lnote{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text2);font-size:13px;padding:8px 11px;font-family:var(--sans);resize:none;outline:none;}
.lnote:focus{border-color:var(--ink);}

/* VÍDEO */
.vrow{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px 12px;background:var(--bg2);border-top:1px solid var(--border);}
.vbox{flex:1;min-width:140px;max-width:340px;}
.vlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.vlbl span{padding:1px 6px;border:1px solid var(--border2);font-size:9px;color:var(--text2);}
.vembed{width:100%;aspect-ratio:16/9;border:none;background:#000;}
.vph{width:100%;aspect-ratio:16/9;background:var(--card);border:1px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
.vph:hover{border-color:var(--ink);}
.vph .vi{font-size:22px;}
.vph p{font-size:11px;color:var(--muted);text-align:center;padding:0 8px;}
.vsend{width:100%;margin-top:6px;padding:8px;border:1px solid #c8e6c9;color:var(--ok);cursor:pointer;font-size:11px;font-family:var(--sans);display:flex;align-items:center;justify-content:center;gap:6px;background:var(--ok-bg);transition:all .15s;}
.vsend:hover{background:#e0f2e5;}
.vfp{width:100%;max-height:200px;background:#000;}

/* RÉCORDS */
.recg{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);}
.recc{background:var(--card);padding:18px 20px;position:relative;border-radius:var(--r);}
.recc.new::before{content:'HOY';position:absolute;top:10px;right:10px;font-size:8px;color:var(--accent);letter-spacing:1px;border:1px solid var(--accent2);padding:2px 5px;}
.recn{font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.3px;}
.recv{font-family:var(--serif);font-size:32px;font-weight:400;line-height:1;color:var(--ink);}
.recm{font-size:10px;color:var(--muted);margin-top:6px;}
.recd{font-size:11px;color:var(--ok);margin-top:3px;}

/* HISTORIAL */
.hcard{background:var(--card);border:1px solid var(--border);margin-bottom:6px;overflow:hidden;}
.hhd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background .12s;}
.hhd:hover{background:var(--bg2);}
.hname_{font-weight:500;font-size:13px;}
.hchev{font-size:11px;color:var(--muted);transition:transform .2s;}
.hchev.open{transform:rotate(180deg);}
.hbody{display:none;border-top:1px solid var(--border);padding:12px 16px;}
.hbody.open{display:block;}
.hsess{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.hsess:last-child{border-bottom:none;}
.hdate{color:var(--muted);min-width:68px;flex-shrink:0;font-size:11px;letter-spacing:.3px;}
.hsets{display:flex;gap:4px;flex-wrap:wrap;}
.hchip{font-size:11px;border:1px solid var(--border);padding:2px 7px;color:var(--text2);}
.hchip.pr{border-color:var(--accent2);color:var(--accent);font-weight:500;}

/* DIETA */
.mg4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-bottom:20px;background:var(--border);border:1px solid var(--border);}
.mc{background:var(--card);padding:16px 18px;}
.mc-v{font-family:var(--serif);font-size:26px;font-weight:400;line-height:1;}
.mc-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:6px;}
.mc-s{font-size:11px;color:var(--text2);margin-top:3px;}
.dpills{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
.dpill{padding:6px 13px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;transition:all .12s;letter-spacing:.3px;}
.dpill.active{border-color:var(--ink);color:var(--ink);background:var(--bg2);}
.dpill.train.active{border-color:var(--accent);color:var(--accent);background:#f8f4ef;}
.dtots{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.dtot{border:1px solid var(--border);padding:8px 13px;font-size:12px;background:var(--card);}
.dtot strong{font-family:var(--serif);font-size:16px;font-weight:400;display:block;}
.dtr{border:1px solid var(--accent2);color:var(--accent);padding:8px 13px;font-size:11px;letter-spacing:.3px;text-transform:uppercase;}
.dre{border:1px solid var(--border);color:var(--muted);padding:8px 13px;font-size:11px;letter-spacing:.3px;}
.mealc{border:1px solid var(--border);margin-bottom:6px;overflow:hidden;background:var(--card);}
.mhd{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background .12s;}
.mhd:hover{background:var(--bg2);}
.mtime{font-size:10px;color:var(--muted);width:40px;flex-shrink:0;font-variant-numeric:tabular-nums;}
.mname_{font-weight:500;font-size:13px;flex:1;}
.mmac{display:flex;gap:8px;font-size:10px;color:var(--muted);}
.mmac .mk{color:var(--ink);font-weight:500;}
.mchev{color:var(--muted);font-size:11px;transition:transform .2s;}
.mchev.open{transform:rotate(180deg);}
.mbody{display:none;border-top:1px solid var(--border);padding:10px 16px;}
.mbody.open{display:block;}
.ingr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.ingr:last-child{border-bottom:none;}
.inqt{color:var(--muted);font-size:11px;}

/* HÁBITOS */
.hg{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.hi{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);padding:12px 14px;cursor:pointer;transition:all .12s;border-radius:var(--r);}
.hi.chk{border-color:var(--ok);background:var(--ok-bg);}
.hbox_{width:18px;height:18px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;}
.hi.chk .hbox_{background:var(--ok);border-color:var(--ok);}
.hck{display:none;}.hi.chk .hck{display:block;}
.htxt{font-size:13px;font-weight:400;}.hsub_{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.2px;}

/* PLANIFICADOR SEMANAL */
.plan-layout{display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start;}
.plan-pool{background:var(--card);border:1px solid var(--border);padding:14px;}
.plan-pool-title{font-size:9px;font-weight:400;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.plan-card{background:var(--bg2);border:1px solid var(--border);padding:10px 12px;margin-bottom:6px;cursor:grab;user-select:none;transition:all .12s;}
.plan-card:active{cursor:grabbing;}
.plan-card.dragging{opacity:.35;}
.plan-card.placed{opacity:.45;border-style:dashed;}
.plan-card-title{font-size:12px;font-weight:500;}
.plan-card-foco{font-size:10px;color:var(--muted);margin-top:2px;}
.plan-card-exs{font-size:10px;color:var(--text2);margin-top:4px;}
.plan-week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.plan-day{background:var(--card);border:1px solid var(--border);min-height:110px;transition:border-color .12s;}
.plan-day.over{border-color:var(--ink);background:var(--bg2);}
.plan-day-hd{padding:7px 10px 6px;border-bottom:1px solid var(--border);}
.plan-day-name{font-size:9px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;}
.plan-day-date{font-size:9px;color:var(--muted);margin-top:1px;}
.plan-day-body{padding:6px;min-height:70px;}
.plan-slot{background:var(--bg2);border:1px solid var(--border);padding:7px 8px;font-size:11px;font-weight:500;color:var(--ink);position:relative;margin-bottom:4px;}
.plan-slot .rm-btn{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;}
.plan-slot .rm-btn:hover{color:var(--warn);}
.plan-slot-foco{font-size:9px;color:var(--muted);margin-top:2px;font-weight:400;}
.plan-drop-hint{font-size:10px;color:var(--border2);text-align:center;padding:14px 4px;letter-spacing:.3px;}

/* PANEL COACH */
.cov{display:none;position:fixed;inset:0;background:rgba(26,24,20,.85);z-index:500;overflow-y:auto;}
.cov.open{display:block;}
.cpan{background:var(--bg);max-width:960px;margin:18px auto;border:1px solid var(--border);}
.chd{background:var(--card);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:10;}
.ctitle{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--accent);}
.ctabs{display:flex;gap:3px;flex-wrap:wrap;}
.ctab{padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-family:var(--sans);letter-spacing:.4px;text-transform:uppercase;transition:all .12s;}
.ctab.active{border-color:var(--ink);color:var(--ink);background:var(--bg2);}
.cclose{padding:5px 12px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-family:var(--sans);letter-spacing:.4px;}
.cbody{padding:18px 22px;}
.csec{display:none;}.csec.active{display:block;}
.elbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;display:block;}
.einp{background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:13px;padding:7px 10px;width:100%;outline:none;font-family:var(--sans);}
.einp:focus{border-color:var(--ink);}
.erow{display:grid;gap:10px;margin-bottom:10px;}
.erow.c2{grid-template-columns:1fr 1fr;}.erow.c3{grid-template-columns:1fr 1fr 1fr;}.erow.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.ecard{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:10px;}
.echd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ectitle{font-family:var(--serif);font-size:14px;font-weight:400;}
.exed{background:var(--bg2);border:1px solid var(--border);padding:11px 13px;margin-bottom:8px;}
.delbtn{background:none;border:1px solid #e0c4c4;color:var(--warn);padding:4px 9px;cursor:pointer;font-size:10px;font-family:var(--sans);letter-spacing:.3px;}
.addbtn{background:transparent;border:1px dashed var(--border2);color:var(--muted);padding:8px;cursor:pointer;font-size:11px;width:100%;font-family:var(--sans);margin-top:5px;letter-spacing:.3px;transition:all .12s;}
.addbtn:hover{border-color:var(--ink);color:var(--ink);}
.sbar{background:var(--card);border-top:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;bottom:0;}
.sbtn{border:1px solid var(--accent);color:var(--accent);background:transparent;padding:9px 22px;cursor:pointer;font-size:12px;font-family:var(--sans);letter-spacing:.3px;transition:all .15s;}
.sbtn:hover{background:#f8f4ef;}
.tgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;}

function rP(s,wi){
  if(!String(s).startsWith('auto:')) return s;
  var k=s.split(':')[1];
  var m={sq_p:0,sq_t:1,bn_p:2,bn_l:3,bn_stop:4,pm_p:5,pm_def:6};
  var i=m[k]; if(i===undefined) return s;
  var v = i<5 ? Math.round((P.pesosBase[i]+(wi-2)*P.progresion)*2)/2 : P.pesosBase[i];
  return v+' kg';
}
function eH(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function lAll(){ return window.__reg||{}; }
function sAll(d){ window.__reg=d; schedSave(); }
function lLog(k){ return lAll()[k]||null; }
function sSet(k,si,f,v){
  var a=lAll(); if(!a[k])a[k]={sets:{},done:false,note:''};
  if(!a[k].sets)a[k].sets={};
  if(!a[k].sets[si])a[k].sets[si]={v:'',r:''};
  a[k].sets[si][f]=v; sAll(a);
}
function sNote(k,v){ var a=lAll(); if(!a[k])a[k]={sets:{},done:false,note:''}; a[k].note=v; sAll(a); }

function chkPR(ek,val,f,wi,di,ri){
  if(f!=='v') return;
  var v=parseFloat(val); if(!v||v<=0) return;
  var nm = getDias(curWeek)[di]&&getDias(curWeek)[di].ejercicios[ri] ? getDias(curWeek)[di].ejercicios[ri].nombre : '';
  if(!nm) return;
  var rec=lRec(); var prev=rec[nm]?rec[nm].val:0;
  if(v>prev){
    rec[nm]={val:v, fecha:new Date().toLocaleDateString('es-ES'), prev:prev};
    sRec(rec); prToast(nm,v,prev);
    var b=document.getElementById('prb-'+ek); if(b) b.style.display='inline-block';
  }
}
function prToast(nm,v,prev){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:20px;right:20px;background:rgba(240,208,96,.13);border:1px solid rgba(240,208,96,.5);color:var(--yellow);padding:12px 16px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;font-family:Inter,sans-serif';
  t.innerHTML='🏆 NUEVO RÉCORD<br><span style="font-weight:400;font-size:12px">'+nm+': '+v+' kg'+(prev?' (ant: '+prev+')':'')+'</span>';
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}
function isPR(ek,di,ri){
  var nm = getDias(curWeek)[di]&&getDias(curWeek)[di].ejercicios[ri] ? getDias(curWeek)[di].ejercicios[ri].nombre : '';
  if(!nm) return false;
  var rec=lRec(); if(!rec[nm]) return false;
  var log=lLog(ek); if(!log||!log.sets) return false;
  var mx=0; Object.values(log.sets).forEach(function(s){ var v=parseFloat(s.v)||0; if(v>mx)mx=v; });
  return mx>0 && mx>=rec[nm].val;
}

  var necesita=P.semanas.some(function(w){ return !w.dias; });
  if(!necesita) return;
  var diasBase=P.dias&&P.dias.length?JSON.parse(JSON.stringify(P.dias)):[];
  P.semanas.forEach(function(w){
    if(!w.dias) w.dias=JSON.parse(JSON.stringify(diasBase));
    if(!w.fechaInicio) w.fechaInicio='';
    if(!w.fechaFin) w.fechaFin='';
  });
  console.log('Plan migrado a estructura por semana');
}

// Días de la semana activa (editor o entreno)
function getDias(wi){
  var w=P.semanas[wi!=null?wi:curWeek];
  if(!w) return P.dias||[];
  if(!w.dias) w.dias=JSON.parse(JSON.stringify(P.dias||[]));
  return w.dias;
}

function dayProg(d,di,wi){
  var a=lAll(); var done=0;

  return {done:done, total:d.ejercicios.length};
}

// ── VÍDEO MODAL ──────────────────────────────────
var _curVTab = 'url';
function swVTab(t){
  _curVTab=t;
  ['url','subir','bib'].forEach(function(x){
    document.getElementById('vsec-'+x).style.display = x===t?'block':'none';
    var btn=document.getElementById('vtab-'+x);
    btn.style.borderBottomColor = x===t?'var(--accent)':'transparent';
    btn.style.color = x===t?'var(--text)':'var(--muted)';
  });
  if(t==='bib') cargarBiblioteca();
}
function oVid(di,ri){
  _vdi=di; _vri=ri;
  document.getElementById('vid-modal').classList.add('open');
  document.getElementById('vid-url-in').value=getDias(_edWeek)[di]&&getDias(_edWeek)[di].ejercicios[ri]?getDias(_edWeek)[di].ejercicios[ri].videoUrl||'':'';
  document.getElementById('vid-err').textContent='';
  document.getElementById('vid-upload-prog').style.display='none';
  swVTab('url');
}
function cVidModal(){ document.getElementById('vid-modal').classList.remove('open'); }
async function saveVid(){
  var err=document.getElementById('vid-err');
  err.textContent='';
  if(_curVTab==='url'){
    var url=document.getElementById('vid-url-in').value.trim();
    if(!url){ err.textContent='Pega un enlace.'; return; }
    getDias(_edWeek)[_vdi].ejercicios[_vri].videoUrl=url;
    getDias(_edWeek)[_vdi].ejercicios[_vri].videoB64='';
    cVidModal(); buildTraining(curWeek);
  } else if(_curVTab==='subir'){
    var fi=document.getElementById('vid-file-in').files[0];
    if(!fi){ err.textContent='Selecciona un archivo.'; return; }
    if(fi.size>50*1024*1024){ err.textContent='Máximo 50 MB.'; return; }
    var prog=document.getElementById('vid-upload-prog');
    prog.style.display='block'; prog.textContent='Subiendo...';
    var entId=window.__entrenadorId||'unknown';
    var ext=fi.name.split('.').pop();
    var path='videos/'+entId+'/'+Date.now()+'.'+ext;
    var {data,error}=await sb.storage.from('media').upload(path,fi,{upsert:true});
    if(error){ prog.style.display='none'; err.textContent='Error al subir: '+error.message; return; }
    var {data:pu}=sb.storage.from('media').getPublicUrl(path);
    getDias(_edWeek)[_vdi].ejercicios[_vri].videoUrl=pu.publicUrl;
    getDias(_edWeek)[_vdi].ejercicios[_vri].videoB64='';
    prog.style.display='none';
    cVidModal(); buildTraining(curWeek);
  }
}
function rmVid(){ getDias(_edWeek)[_vdi].ejercicios[_vri].videoUrl=''; getDias(_edWeek)[_vdi].ejercicios[_vri].videoB64=''; cVidModal(); buildTraining(curWeek); }

// ── BIBLIOTECA DE VÍDEOS ──────────────────────────
async function cargarBiblioteca(){
  var lista=document.getElementById('vid-bib-list');
  lista.innerHTML='<span style="font-size:11px;color:var(--muted)">Cargando...</span>';
  var entId=window.__entrenadorId||'unknown';
  var {data,error}=await sb.storage.from('media').list('videos/'+entId, {sortBy:{column:'created_at',order:'desc'}});
  if(error||!data||data.length===0){
    lista.innerHTML='<span style="font-size:11px;color:var(--muted)">No tienes vídeos en biblioteca. Sube el primero abajo.</span>';
    return;
  }
  lista.innerHTML='';
  data.forEach(function(f){
    var {data:pu}=sb.storage.from('media').getPublicUrl('videos/'+entId+'/'+f.name);
    var nombre=f.metadata?.nombre||f.name.replace(/^\d+\./,'').replace(/\.\w+$/,'');
    var item=document.createElement('div');
    item.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:var(--r);cursor:pointer;gap:8px;border:1px solid transparent';
    item.innerHTML='<span style="font-size:12px;flex:1;color:var(--text)">🎬 '+nombre+'</span>'
      +'<button style="background:var(--ok);color:#fff;border:none;padding:4px 10px;border-radius:4px;font-size:11px;font-family:var(--sans);cursor:pointer">Usar</button>';
    item.querySelector('button').onclick=function(){
      getDias(_edWeek)[_vdi].ejercicios[_vri].videoUrl=pu.publicUrl;
      getDias(_edWeek)[_vdi].ejercicios[_vri].videoB64='';
      cVidModal(); buildTraining(curWeek);
    };
    lista.appendChild(item);
  });
}
async function subirABiblioteca(){
  var fi=document.getElementById('vid-bib-file').files[0];
  var nombre=document.getElementById('vid-bib-nombre').value.trim();
  var prog=document.getElementById('vid-bib-prog');
  if(!fi){ prog.textContent='Selecciona un archivo.'; return; }
  if(!nombre){ prog.textContent='Escribe un nombre.'; return; }
  if(fi.size>50*1024*1024){ prog.textContent='Máximo 50 MB.'; return; }
  prog.textContent='Subiendo...';
  var entId=window.__entrenadorId||'unknown';
  var ext=fi.name.split('.').pop();
  var path='videos/'+entId+'/'+nombre.replace(/\s+/g,'_')+'.'+ext;
  var {data,error}=await sb.storage.from('media').upload(path,fi,{upsert:true});
  if(error){ prog.textContent='Error: '+error.message; return; }
  prog.textContent='✓ Subido correctamente';
  document.getElementById('vid-bib-file').value='';
  document.getElementById('vid-bib-nombre').value='';
  setTimeout(function(){ prog.textContent=''; cargarBiblioteca(); },1500);
}
function upVid(ek){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='video/*'; inp.capture='environment';
  inp.onchange=function(){
    var f=inp.files[0]; if(!f) return;
    if(f.size>80*1024*1024){ alert('Vídeo demasiado grande (+80 MB).'); return; }
    var rd=new FileReader(); rd.onload=function(e){ var a=lAll(); if(!a[ek])a[ek]={sets:{},done:false,note:''}; a[ek].vidB64=e.target.result; sAll(a); buildTraining(curWeek); }; rd.readAsDataURL(f);
  }; inp.click();
}
function sendWA(nm){
  var t=(P.telefonoEntrenador||'').replace(/\D/g,'');
  var tx=encodeURIComponent(
    '¡Hola! Te mando el vídeo de *'+nm+'* para que lo revises 🎥\n\n'+
    '— '+P.nombre+' '+P.apellido
  );
  window.open(t?'https://wa.me/'+t+'?text='+tx:'https://wa.me/?text='+tx,'_blank');
}

// ── PLANIFICADOR SEMANAL ─────────────
var SEMANA_KEY='semana_plan_v1';
var DIAS_SEMANA=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
var _dragDi=null;

function loadSemana(){ return window.__sem||{}; }
function saveSemana(d){ window.__sem=d; schedSave(); }

function buildSemana(){
  var asign=loadSemana(); // {0:[di,...], 1:[di,...], ...} por día semana (0=Lun)
  // calcular lunes de la semana actual
  var now=new Date(); var dow=now.getDay(); var diff=dow===0?-6:1-dow;
  var lunes=new Date(now); lunes.setDate(now.getDate()+diff);

  // POOL — cards arrastrables
  var _diasSem=getDias(curWeek); var poolHtml=_diasSem.map(function(d,di){
    var placed=Object.values(asign).some(function(arr){return arr.indexOf(di)>=0;});
    var exNames=d.ejercicios.filter(function(r){return r.principal;}).map(function(r){return r.nombre;}).join(' · ')||d.ejercicios[0].nombre;
    return '<div class="plan-card'+(placed?' placed':'')+'" id="pc-'+di+'" draggable="true"'+
      ' ondragstart="dStart(event,'+di+')"'+
      ' ontouchstart="tStart(event,'+di+')" ontouchmove="tMove(event)" ontouchend="tEnd(event)">'+
      '<div class="plan-card-title">'+eH(d.titulo)+'</div>'+
      '<div class="plan-card-foco">'+eH(d.foco)+'</div>'+
      '<div class="plan-card-exs">⭐ '+eH(exNames)+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('plan-pool').innerHTML=poolHtml;

  // SEMANA — 7 columnas
  var weekHtml=DIAS_SEMANA.map(function(dn,si){
    var fecha=new Date(lunes); fecha.setDate(lunes.getDate()+si);
    var dd=fecha.getDate(); var mm=fecha.getMonth()+1;
    var isHoy=fecha.toDateString()===now.toDateString();
    var slots=(asign[si]||[]).map(function(di){
      var d=getDias(curWeek)[di]; if(!d) return '';
      return '<div class="plan-slot">'+
        '<button class="rm-btn" onclick="rmSlot('+si+','+di+')">✕</button>'+
        '<div style="font-size:11px;font-weight:700;padding-right:14px">'+eH(d.titulo.split('—')[1]||d.titulo).trim()+'</div>'+
        '<div class="plan-slot-foco">'+eH(d.foco)+'</div>'+
      '</div>';
    }).join('');
    return '<div class="plan-day'+(isHoy?' ':'')+'" id="pd-'+si+'"'+
      ' ondragover="dOver(event,'+si+')" ondragleave="dLeave(event,'+si+')" ondrop="dDrop(event,'+si+')" style="'+(isHoy?'border-color:var(--green);':'')+'">'+
      '<div class="plan-day-hd">'+
        '<div class="plan-day-name" style="'+(isHoy?'color:var(--green)':'')+'">'+dn+(isHoy?' ·hoy':'')+'</div>'+
        '<div class="plan-day-date">'+dd+'/'+mm+'</div>'+
      '</div>'+
      '<div class="plan-day-body" id="pdb-'+si+'">'+
        (slots||'<div class="plan-drop-hint">Arrastra aquí</div>')+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('plan-week').innerHTML=weekHtml;
}

// Drag desktop
function dStart(e,di){ _dragDi=di; e.dataTransfer.effectAllowed='move'; setTimeout(function(){var el=document.getElementById('pc-'+di);if(el)el.classList.add('dragging');},0); }
function dOver(e,si){ e.preventDefault(); e.dataTransfer.dropEffect='move'; document.getElementById('pd-'+si).classList.add('over'); }
function dLeave(e,si){ document.getElementById('pd-'+si).classList.remove('over'); }
function dDrop(e,si){ e.preventDefault(); document.getElementById('pd-'+si).classList.remove('over'); if(_dragDi===null) return; assignDay(si,_dragDi); _dragDi=null; }

// Touch mobile
var _touchDi=null, _touchClone=null;
function tStart(e,di){
  _touchDi=di; var card=e.currentTarget;
  var r=card.getBoundingClientRect();
  _touchClone=card.cloneNode(true);
  _touchClone.style.cssText='position:fixed;z-index:9999;width:'+r.width+'px;opacity:.85;pointer-events:none;top:'+r.top+'px;left:'+r.left+'px;transition:none';
  document.body.appendChild(_touchClone);
  card.classList.add('dragging');
}
function tMove(e){
  if(!_touchClone) return; e.preventDefault();
  var t=e.touches[0];
  _touchClone.style.top=(t.clientY-30)+'px';
  _touchClone.style.left=(t.clientX-80)+'px';
  // highlight target
  document.querySelectorAll('.plan-day').forEach(function(el){el.classList.remove('over');});
  var el=document.elementFromPoint(t.clientX,t.clientY);
  var day=el&&el.closest('.plan-day');
  if(day) day.classList.add('over');
}
function tEnd(e){
  if(_touchClone){_touchClone.remove();_touchClone=null;}
  document.querySelectorAll('.plan-day').forEach(function(el){el.classList.remove('over');});
  var card=document.getElementById('pc-'+_touchDi); if(card) card.classList.remove('dragging');
  if(_touchDi===null) return;
  var t=e.changedTouches[0];
  var el=document.elementFromPoint(t.clientX,t.clientY);
  var day=el&&el.closest('.plan-day');
  if(day){var si=parseInt(day.id.replace('pd-','')); assignDay(si,_touchDi);}
  _touchDi=null;
}

function assignDay(si,di){
  var asign=loadSemana();
  // quitar de cualquier día anterior
  Object.keys(asign).forEach(function(k){ asign[k]=(asign[k]||[]).filter(function(x){return x!==di;}); });
  if(!asign[si]) asign[si]=[];
  if(asign[si].indexOf(di)<0) asign[si].push(di);
  saveSemana(asign);
  buildSemana();
}
function rmSlot(si,di){
  var asign=loadSemana();
  if(asign[si]) asign[si]=asign[si].filter(function(x){return x!==di;});
  saveSemana(asign);
  buildSemana();
}

// ── DASHBOARD ─────────────────────────
function buildDashboard(){
  if(!document.getElementById('dash-body')) return;
  var all=lAll();
  var ci=P.semanas.findIndex(function(w){return w.current;}); var wi=ci>=0?ci:curWeek;
  var done=0, total=0, vol=0;
  getDias(curWeek).forEach(function(d,di){ d.ejercicios.forEach(function(r,ri){
    var k='ex_w'+wi+'_d'+di+'_r'+ri; total++;
    var l=all[k]; if(!l) return;
    if(l.done) done++;
    if(l.sets) Object.values(l.sets).forEach(function(s){ vol+=(parseFloat(s.v)||0)*(parseFloat(s.r)||0); });
  }); });
  var rec=lRec(); var nrec=Object.keys(rec).length;
  var now=new Date();
  document.getElementById('dash-fecha').textContent=now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dash-stats').innerHTML=
    '<div class="dc"><div class="dc-num cg">'+done+'<span style="font-size:15px;color:var(--muted)">/'+total+'</span></div><div class="dc-lbl">Ejercicios</div><div class="dc-sub">completados hoy</div></div>'+
    '<div class="dc"><div class="dc-num cy">'+nrec+'</div><div class="dc-lbl">Récords</div><div class="dc-sub">marcas personales</div></div>'+
    '<div class="dc"><div class="dc-num cb">'+Math.round(vol)+'</div><div class="dc-lbl">Volumen kg</div><div class="dc-sub">esta semana</div></div>'+
    '<div class="dc"><div class="dc-num cp">'+P.semanas.length+'</div><div class="dc-lbl">Semanas</div><div class="dc-sub">en el plan</div></div>';
  // sesión de hoy
  var dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var hoy=dias[now.getDay()]; var sesHoy=null;
  getDias(curWeek).forEach(function(d,di){ if(d.titulo.toLowerCase().indexOf(hoy.toLowerCase())>=0) sesHoy={d:d,di:di}; });
  var sesHtml='';
  if(sesHoy){
    var pg=dayProg(sesHoy.d,sesHoy.di,wi);
    var pct=pg.total?Math.round(pg.done/pg.total*100):0;
    sesHtml='<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">'+
      '<div style="font-family:Syne,sans-serif;font-size:13px;font-weight:700;margin-bottom:4px">Sesión de hoy</div>'+
      '<div style="font-size:12px;color:var(--text2);margin-bottom:10px">'+sesHoy.d.titulo+' · '+sesHoy.d.foco+'</div>'+
      '<div style="display:flex;gap:10px;align-items:center">'+
        '<div style="flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden">'+
          '<div style="height:100%;background:var(--green);width:'+pct+'%;border-radius:4px;transition:width .6s"></div>'+
        '</div>'+
        '<span style="font-size:13px;font-weight:700;color:var(--green)">'+pg.done+'/'+pg.total+'</span>'+
      '</div>'+
    '</div>';
  } else {
    sesHtml='<div class="note">No hay sesión programada para hoy. Descansa bien 💤</div>';
  }
  document.getElementById('dash-sesion').innerHTML=sesHtml;
  var msgHtml='';
  if(P.mensaje) msgHtml='<div class="note purple"><strong>💬 Tu entrenador dice:</strong> '+eH(P.mensaje)+'</div>';
  document.getElementById('dash-msg').innerHTML=msgHtml;
}

// ── RÉCORDS ───────────────────────────
function buildRecords(){
  var rec=lRec(); var keys=Object.keys(rec);
  var empty=document.getElementById('rec-empty');
  if(!keys.length){ document.getElementById('records-grid').innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  var today=new Date().toLocaleDateString('es-ES');
  document.getElementById('records-grid').innerHTML=keys.map(function(nm){
    var r=rec[nm]; var isNew=r.fecha===today;
    return '<div class="recc'+(isNew?' new':'')+'">'+
      '<div class="recn">'+eH(nm)+'</div>'+
      '<div class="recv">'+r.val+' <span style="font-size:14px;color:var(--muted);font-family:Inter">kg</span></div>'+
      '<div class="recm">'+r.fecha+(r.prev?'':' · primer registro')+'</div>'+
      (r.prev&&r.val>r.prev ? '<div class="recd">+'+Math.round((r.val-r.prev)*10)/10+' kg vs anterior</div>' : '')+
    '</div>';
  }).join('');
}

// ── HISTORIAL ─────────────────────────
function buildHistorial(){
  var all=lAll(); var filter=document.getElementById('hist-filter').value;
  var byEx={};
  P.semanas.forEach(function(wk,wi){
    getDias(curWeek).forEach(function(d,di){ d.ejercicios.forEach(function(r,ri){
      var k='ex_w'+wi+'_d'+di+'_r'+ri; var log=all[k]; if(!log) return;
      var nm=r.nombre; if(filter&&nm!==filter) return;
      if(!byEx[nm]) byEx[nm]=[];
      byEx[nm].push({semana:wk.label,log:log});
    }); });
  });
  var rec=lRec();
  var html=Object.keys(byEx).map(function(nm){
    var sessions=byEx[nm];
    var sessHtml=sessions.map(function(s){
      var sets=s.log.sets||{};
      var chips=Object.keys(sets).map(function(si){
        var sv=sets[si].v||'—'; var sr=sets[si].r||'—';
        var recVal=rec[nm]?rec[nm].val:0;
        var prFlag=recVal>0&&parseFloat(sv)>=recVal;
        return '<span class="hchip'+(prFlag?' pr':'')+'">S'+(parseInt(si)+1)+': '+sv+'×'+sr+(prFlag?' 🏆':'')+'</span>';
      }).join('');
      return '<div class="hsess">'+
        '<div class="hdate">'+s.semana+'</div>'+
        '<div>'+
          '<div class="hsets">'+chips+'</div>'+
          (s.log.note?'<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">💬 '+eH(s.log.note)+'</div>':'')+
          (s.log.done?'<div style="font-size:10px;color:var(--green);margin-top:2px">✓ completado</div>':'')+
        '</div>'+
      '</div>';
    }).join('');
    var hid='h-'+encodeURIComponent(nm);
    return '<div class="hcard">'+
      '<div class="hhd" onclick="togHist(\''+hid+'\',this)">'+
        '<div class="hname_">'+eH(nm)+'</div>'+
        '<span class="hchev">▾</span>'+
      '</div>'+
      '<div class="hbody" id="'+hid+'">'+sessHtml+'</div>'+

// ── TIMER ─────────────────────────────
var tT=180,tL=180,tRun=false,tIv=null;
function tSet(s){tStop();tT=s;tL=s;tRender();}
function tStartTimer(){
  document.getElementById('t-play').textContent='⏸ Pausa'; document.getElementById('t-play').classList.add('run');
  tIv=setInterval(function(){tL--;tRender();if(tL<=0){tStop();tBeep();}},1000);
}
function tStop(){ clearInterval(tIv);tRun=false; var b=document.getElementById('t-play'); b.textContent='▶ Iniciar'; b.classList.remove('run'); }
function tToggle(){ tRun?tStop():tStartTimer(); }
function tReset(){ tStop();tL=tT;tRender(); }
function tRender(){
  var m=Math.floor(tL/60); var s=('0'+tL%60).slice(-2);
  var el=document.getElementById('t-num'); var fi=document.getElementById('t-fill');
  el.textContent=m+':'+s; var pct=tT>0?(tL/tT)*100:0; fi.style.width=pct+'%';
  el.className='tnum'; fi.style.background='var(--green)';
  if(tL<=P.restWarn&&tL>0){el.classList.add('warn');fi.style.background='var(--yellow)';}
  if(tL<=0){el.classList.add('over');fi.style.background='var(--red)';fi.style.width='100%';}
}
function tBeep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.15,.3].forEach(function(t){ var o=ctx.createOscillator();var g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=0.3;o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.12); });
  }catch(e){}
}

function buildProg(){
  var all=lAll();
  var done=Object.values(all).filter(function(v){return v.done;}).length;
  var html='<div class="statrow">'+
    '<div class="statc"><strong class="cg">'+done+'</strong><span>Completados</span></div>'+
    '<div class="statc"><strong class="cb">'+Object.keys(all).length+'</strong><span>Con registro</span></div>'+
    '<div class="statc"><strong class="cy">'+P.semanas.length+'</strong><span>Semanas</span></div>'+
  '</div>';
  var hayDatos=false;
  P.semanas.forEach(function(wk,wi){
    var sec='';
    getDias(curWeek).forEach(function(d,di){
      var dH='';
      d.ejercicios.forEach(function(r,ri){
        var k='ex_w'+wi+'_d'+di+'_r'+ri; var log=all[k]; if(!log) return;
        var chips=''; var ns=parseInt(r.series)||4;
        for(var si=0;si<ns;si++){
          var sv=(log.sets&&log.sets[si])?log.sets[si].v:'—';
          var sr=(log.sets&&log.sets[si])?log.sets[si].r:'—';
          chips+='<span class="pch'+(sv!=='—'?' ok':'')+'">S'+(si+1)+' <span class="sv">'+sv+'kg</span>×<span class="sr">'+sr+'</span></span> ';
        }
        dH+='<div class="prow">'+
          '<div>'+
            '<div style="font-weight:500">'+(r.principal?'⭐ ':'')+eH(r.nombre)+'</div>'+
            '<div style="font-size:10px;color:var(--muted)">Plan: '+rP(r.peso,wi)+' · '+r.series+'</div>'+
            (log.note?'<div style="font-size:10px;color:var(--muted);font-style:italic">💬 "'+eH(log.note)+'"</div>':'')+
          '</div>'+
          '<div>'+chips+'</div>'+
          '<span class="dbadge'+(log.done?' ok':' no')+'">'+(log.done?'✓ Hecho':'Pendiente')+'</span>'+
        '</div>';
      });
      if(dH) sec+='<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px">'+eH(d.titulo)+'</div>'+dH+'</div>';
    });
    if(sec){
      hayDatos=true;
      html+='<div style="margin-bottom:18px">'+
        '<div style="font-family:Syne,sans-serif;font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">'+
          '📅 '+eH(wk.label)+(wk.current?' — semana actual':'')+
        '</div>'+sec+'</div>';
    }
  });
  if(!hayDatos) html+='<div class="note">El cliente aún no ha registrado ningún entreno.</div>';
  document.getElementById('prog-body').innerHTML=html;
}

    var d=JSON.parse(raw);
    if(d.logs) localStorage.setItem('trainlog_v3',JSON.stringify(d.logs));
    if(d.rec)  localStorage.setItem('rec_v1',JSON.stringify(d.rec));
    if(d.hab)  localStorage.setItem('h_'+new Date().toDateString(),JSON.stringify(d.hab));
    if(d.sem)  localStorage.setItem('semana_plan_v1',JSON.stringify(d.sem));
    if(d.plan) Object.assign(P,d.plan);
    if(d.diet) Object.assign(DIET,d.diet);
    applyUI(); buildDietMacros(); buildDietPills(); renderDiet('lun');
    buildHabits(); buildDashboard(); applyVis();
    dStatus('ok','Cargado · '+new Date(d.ts).toLocaleTimeString('es-ES'));
  }catch(e){ dStatus('err','Error al cargar: '+e.message); }
}

function driveFindFile(cb){
  gapi.client.request({
    path:'https://www.googleapis.com/drive/v3/files',
    params:{spaces:'appDataFolder',fields:'files(id,name)',q:"name=\'"+FNAME+"\'"},
    callback:function(r){ cb(r.result&&r.result.files&&r.result.files[0]?r.result.files[0].id:null); }
  });
}

function driveSave(){
  if(!_gtoken){ driveLogin(); return; }
  dStatus('sync','Guardando...');
  var data=driveGetData();
  driveFindFile(function(fid){
    var method=fid?'PATCH':'POST';
    var url=fid?
      'https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=multipart':
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    var meta=JSON.stringify(fid?{}:{name:FNAME,parents:['appDataFolder']});
    var boundary='---pe'+Date.now();
    var body='--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+meta+
      '\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+data+'\r\n--'+boundary+'--';
    fetch(url,{method:method,headers:{'Authorization':'Bearer '+_gtoken,'Content-Type':'multipart/related; boundary='+boundary},body:body})
      .then(function(r){return r.json();})
      .then(function(r){
        if(r.id){ _gfid=r.id; dStatus('ok','Guardado · '+new Date().toLocaleTimeString('es-ES')); }
        else dStatus('err','Error al guardar');
      }).catch(function(e){dStatus('err','Error: '+e.message);});
  });
}

function driveLoad(){
  if(!_gtoken){ driveLogin(); return; }
  dStatus('sync','Cargando...');
  driveFindFile(function(fid){
    if(!fid){ dStatus('ok','Sin datos en Drive aún — guarda para empezar'); return; }
    _gfid=fid;
    fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',
      {headers:{'Authorization':'Bearer '+_gtoken}})
      .then(function(r){return r.text();})
      .then(function(raw){ driveApplyData(raw); })
      .catch(function(e){dStatus('err','Error: '+e.message);});
  });
}

function montarPanel(cliente, plan, registros, token, isCoach, clienteId){
  var cid = clienteId||cliente?.id||'';
  var nombreCliente = (cliente?.nombre||'')+(cliente?.apellido?' '+cliente.apellido:'');

  window.__reg = registros.logs||{};
  window.__rec = registros.rec||{};
  window.__hab = registros.hab||{};
  window.__sem = registros.sem||{};
  window.__cid = cid;

  window.__onSave = async function(){
    var datos = {logs:window.__reg||{}, rec:window.__rec||{}, hab:window.__hab||{}, sem:window.__sem||{}};
    await guardarRegistros(cid, datos);
    var el=document.getElementById('sync-status');
    if(el) el.textContent='Guardado '+new Date().toLocaleTimeString('es-ES');
  };

  showView('view-cliente');
  var container = document.getElementById('cliente-app');
  container.innerHTML = '';

  var top = document.createElement('div');
  top.style.cssText = 'background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100';
  top.innerHTML = '<span style="font-family:var(--serif);font-size:16px">PanelFit</span>'
    + '<div style="display:flex;gap:8px;align-items:center">'
    + (isCoach ? '<button class="tbtn" style="border-color:var(--ok);color:var(--ok)" onclick="volverDash()">← Mis clientes</button>' : '')
    + '<span id="sync-status" style="font-size:11px;color:var(--muted)"></span>'
    + '<button class="tbtn" onclick="window.__onSave()">☁ Guardar</button>'
    + '</div>';
  container.appendChild(top);

  var root = document.createElement('div');
  root.id = 'panel-root';
  container.appendChild(root);
  root.innerHTML = PANEL_HTML;

  if(plan && plan.P) Object.assign(P, plan.P);
  if(plan && plan.DIET) Object.assign(DIET, plan.DIET);
  if(nombreCliente){ var pts=nombreCliente.split(' '); if(!plan?.P?.nombre){P.nombre=pts[0];P.apellido=pts.slice(1).join(' ');} }
  // ── MIGRACIÓN: plan antiguo (P.dias plano) → cada semana tiene sus dias
  migrarPlanSiNecesario();

  var ci = P.semanas.findIndex(function(w){return w.current;}); if(ci>=0) curWeek=ci;
  _edWeek = curWeek; // sincronizar editor con semana actual
  buildWeekPills(); buildTraining(curWeek);
  buildDashboard(); applyVis();
  buildDietMacros(); buildDietPills(); renderDiet('lun');
  buildHabits(); tSet(P.restMain); loadTheme(); setTimeout(cargarGaleria,500);
  showTab('dashboard', document.querySelector('#panel-root .tab'));

  if(isCoach){
    // Guardar ID entrenador para Storage
    if(window._user) window.__entrenadorId=window._user.id;
    // Ocultar PIN inmediatamente — entrenador ya autenticado
    var pinMod=document.getElementById('pin-modal');
    if(pinMod) pinMod.style.display='none';
    var pinBtn=document.querySelector('.abtn.p');
    if(pinBtn) pinBtn.style.display='none';
    setTimeout(function(){
      console.log('Abriendo coach overlay...'); oCoach();
      var orig = window.saveClose;
      window.saveClose = function(){
        orig && orig();
        guardarPlan(cid, {P:P, DIET:DIET}).then(function(){
          var el=document.getElementById('sync-status');
          if(el) el.textContent='Plan guardado '+new Date().toLocaleTimeString('es-ES');
          // Ofrecer notificación WhatsApp al cliente
          var telCliente=P.telefonoCliente||'';
          var enlaceCliente=window.location.origin+window.location.pathname+'?c='+window.__cid_token;
          var msg=encodeURIComponent(
            '¡Hola '+P.nombre+'! 💪 He actualizado tu plan de entrenamiento.\n\n'+
            '👉 Accede aquí: '+enlaceCliente+'\n\n'+
            '¡A por ello!'
          );
          var waUrl=telCliente?'https://wa.me/'+telCliente.replace(/\D/g,'')+'?text='+msg:'https://wa.me/?text='+msg;
          var btn=document.createElement('button');
          btn.textContent='📱 Avisar al cliente por WhatsApp';
          btn.style.cssText='position:fixed;bottom:24px;right:24px;background:#25D366;color:#fff;border:none;padding:12px 20px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;font-family:var(--sans);z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25)';
          btn.onclick=function(){ window.open(waUrl,'_blank'); document.body.removeChild(btn); };
          document.body.appendChild(btn);
          setTimeout(function(){ if(btn.parentNode) document.body.removeChild(btn); },8000);
        });
      };
    }, 200);
  }
}

function prevFoto(lado, inp){
  var f=inp.files[0]; if(!f) return;
  var div=document.getElementById('prev-'+lado);
  var url=URL.createObjectURL(f);
  div.innerHTML='<img src="'+url+'" style="width:100%;height:60px;object-fit:cover;border-radius:4px">';
}

async function subirFotos(){
  var fecha=document.getElementById('foto-fecha').value;
  var err=document.getElementById('foto-upload-err');
  err.textContent='';
  if(!fecha){ err.textContent='Selecciona una fecha.'; return; }
  var cid=window.__cid;
  if(!cid){ err.textContent='Error: cliente no identificado.'; return; }
  var btn=document.querySelector('[onclick="subirFotos()"]');
  btn.textContent='Subiendo...'; btn.disabled=true;

  var urls={frente:null,espalda:null,lateral:null};
  for(var lado of ['frente','espalda','lateral']){
    var fi=document.getElementById('fi-'+lado).files[0];
    if(!fi) continue;
    var ext=fi.name.split('.').pop();
    var path='fotos/'+cid+'/'+fecha+'_'+lado+'.'+ext;
    var {data,error}=await sb.storage.from('media').upload(path,fi,{upsert:true});
    if(error){ err.textContent='Error subiendo '+lado+': '+error.message; btn.textContent='☁️ Guardar fotos'; btn.disabled=false; return; }
    var {data:pu}=sb.storage.from('media').getPublicUrl(path);
    urls[lado]=pu.publicUrl;
  }
  if(!urls.frente&&!urls.espalda&&!urls.lateral){ err.textContent='Selecciona al menos una foto.'; btn.textContent='☁️ Guardar fotos'; btn.disabled=false; return; }

  var {error:dbErr}=await sb.from('fotos').upsert({
    cliente_id:cid, fecha:fecha,
    url_frente:urls.frente, url_espalda:urls.espalda, url_lateral:urls.lateral
  },{onConflict:'cliente_id,fecha'});

  btn.textContent='☁️ Guardar fotos'; btn.disabled=false;
  if(dbErr){ err.textContent='Error guardando: '+dbErr.message; return; }

  // Limpiar
  ['frente','espalda','lateral'].forEach(function(l){
    document.getElementById('fi-'+l).value='';
    document.getElementById('prev-'+l).innerHTML='';
  });
  document.getElementById('foto-fecha').value='';
  err.style.color='var(--ok)'; err.textContent='✓ Fotos guardadas';
  setTimeout(function(){ err.textContent=''; err.style.color='var(--warn)'; },2000);
  cargarGaleria();
}

async function cargarGaleria(){
  var cid=window.__cid; if(!cid) return;
  var gal=document.getElementById('fotos-galeria'); if(!gal) return;
  var {data,error}=await sb.from('fotos').select('*').eq('cliente_id',cid).order('fecha',{ascending:false});
  if(error||!data||data.length===0){
    gal.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">Aún no hay fotos. Sube la primera entrada arriba.</div>';
    return;
  }
  gal.innerHTML='';
  data.forEach(function(row){
    var card=document.createElement('div');
    card.style.cssText='background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px';
    var fecha=new Date(row.fecha+'T00:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
    var imgs='';
    if(row.url_frente) imgs+='<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">Frente</div><img src="'+row.url_frente+'" style="width:100%;border-radius:4px;object-fit:cover;max-height:200px"></div>';
    if(row.url_espalda) imgs+='<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">Espalda</div><img src="'+row.url_espalda+'" style="width:100%;border-radius:4px;object-fit:cover;max-height:200px"></div>';
    if(row.url_lateral) imgs+='<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px">Lateral</div><img src="'+row.url_lateral+'" style="width:100%;border-radius:4px;object-fit:cover;max-height:200px"></div>';
    card.innerHTML='<div style="font-size:13px;font-weight:500;margin-bottom:10px;color:var(--text)">📅 '+fecha+'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px">'+imgs+'</div>';
    gal.appendChild(card);
  });
}
