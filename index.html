<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6e5438" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PanelFit" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO básico -->
    <meta name="description" content="PanelFit — Panel de entrenamiento personal" />
    <title>PanelFit</title>
    <link rel="icon" type="image/png" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Registrar Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PanelFit] SW registrado:', reg.scope))
            .catch(err => console.warn('[PanelFit] SW error:', err))
        })
      }
    </script>
  </body>
</html>
